name: python

on:
  push:
    branches: [main]
    paths:
      - "python/**"
      - ".github/workflows/python.yml"
  pull_request:
    paths:
      - "python/**"
      - ".github/workflows/python.yml"

concurrency:
  group: python-${{ github.ref }}
  cancel-in-progress: true


defaults:
  run:
    working-directory: python

jobs:
  check:
    name: ruff, ty, pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: uv sync
        run: uv sync --frozen

      - name: ruff check
        run: uv run ruff check

      - name: ruff format --check
        run: uv run ruff format --check

      - name: ty check
        run: uv run ty check

      - name: pytest
        run: uv run pytest

      # Metadata-validation gate. Builds wheel + sdist and runs the same
      # twine check that PyPI runs at upload time — catches license-files
      # / classifier / version-string regressions at PR time, before they
      # burn a version slot on real PyPI.
      - name: uv build
        run: uv build

      - name: twine check
        run: uv tool run --from twine twine check dist/*
