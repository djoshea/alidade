# Release-please: open and maintain a "release PR" whenever new
# conventional-commit changes land on main since the last release tag.
# Merging the release PR fires the version tag (e.g. `v0.0.2`), which in
# turn triggers .github/workflows/release.yml — the actual publishes.
#
# Two-job structure:
#
#   release-please   →   release-please-action opens or updates the
#                        release PR with version bumps + a generated
#                        CHANGELOG entry. release-please does NOT run
#                        language toolchains, so the lockfiles
#                        (Cargo.lock, pnpm-lock.yaml, python/uv.lock)
#                        are not refreshed at this point.
#
#   refresh-lockfiles  →  invokes .github/workflows/update-lockfiles.yml
#                         (a reusable workflow) which checks out the
#                         release PR branch and runs `cargo update`,
#                         `pnpm install --lockfile-only`, and `uv lock`,
#                         committing any lockfile changes back to the
#                         same branch. Gated on `prs_created` so it only
#                         runs when there's actually a PR to amend.
#
# Calling a reusable workflow via `uses: ./...` runs it as a nested job
# in the same workflow run, inheriting the caller's GITHUB_TOKEN auth
# context. This sidesteps GitHub's cascade-prevention rule (which would
# otherwise block a separately-triggered `on: pull_request` workflow
# from firing on the bot-authored PR) without needing a Personal Access
# Token.
#
# Conventional-commit semantics drive the bump computed in act 1:
#   fix:                      → patch  (e.g. 0.0.1 → 0.0.2)
#   feat:                     → minor  (e.g. 0.0.1 → 0.1.0)
#   feat!: / BREAKING CHANGE: → major
#   chore / docs / refactor / test / ci → no bump; not in changelog
#
# Config-file (release-please-config.json) field notes:
#
#   "include-component-in-tag": false
#       Single-package repo from release-please's POV; the tag is plain
#       `vX.Y.Z`, not `alidade-vX.Y.Z`. Matches our existing `v0.0.1`.
#
#   "include-v-in-tag": true
#       Tag is `v0.0.1` not `0.0.1`. Matches what release.yml triggers
#       on (`tags: ['v*']`).
#
#   "separate-pull-requests": false
#       One release PR for the whole repo (vs one PR per package). We
#       have one logical package; this is just the safe knob.
#
#   "packages.\".\".release-type": "simple"
#       The "simple" release type does not auto-edit any package
#       manifest. Every file we want updated is listed in extra-files.
#       We use "simple" instead of "rust"/"node"/"python" because
#       release-please's typed updaters target each crate's own
#       [package].version line, and our root Cargo.toml uses
#       [workspace.package].version (with the rest inheriting).
#
#   "packages.\".\".bump-minor-pre-major": true
#       While still pre-1.0, treat "feat:" as a minor bump
#       (0.0.x → 0.1.0) instead of leaving versions stuck on 0.0.x
#       until an explicit BREAKING CHANGE. Standard for active 0.x.
#
#   "packages.\".\".bump-patch-for-minor-pre-major": false
#       Companion to the above: "fix:" still produces patch bumps.
#
#   "extra-files": [...]
#       Each entry tells release-please where to rewrite a version
#       string. type "generic" finds lines annotated with the comment
#       `# x-release-please-version` and updates the SemVer found on
#       that line (used for TOML and Python source). type "json"
#       updates the value at the given jsonpath (used for our four
#       package.json files, since JSON has no comments).

name: release-please

on:
  # Runs on every push to main. release-please decides for itself
  # whether to open/update a release PR — most pushes (chores, docs,
  # etc.) result in a no-op.
  push:
    branches: [main]

  # Manual trigger from the Actions tab — useful for re-running after
  # changing release-please configuration or a repo-level permission,
  # without needing a fresh push to main.
  workflow_dispatch:

# release-please needs both:
#   contents: write — to push the release PR branch and (on merge) the tag
#   pull-requests: write — to open and update the release PR
permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    # Expose `prs_created` to the downstream job so it can gate on
    # "did release-please actually open/update a PR this run?".
    outputs:
      prs_created: ${{ steps.rp.outputs.prs_created }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: rp
        with:
          # Both files live at the repo root by convention.
          config-file: release-please-config.json
          # Tracks the currently-released version for each package; how
          # release-please bootstraps without scanning all of history.
          # Seeded to 0.0.1 (the version live on registries).
          manifest-file: .release-please-manifest.json

  refresh-lockfiles:
    needs: release-please
    if: ${{ needs.release-please.outputs.prs_created == 'true' }}
    # Reusable workflow call. The called workflow runs as a nested job
    # in the same run and inherits the caller's GITHUB_TOKEN.
    uses: ./.github/workflows/update-lockfiles.yml
    with:
      # release-please's branch name for our single-package config is
      # stable across runs.
      branch: release-please--branches--main
