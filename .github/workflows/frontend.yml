name: frontend

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "packages/**"
      - "npm/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "app/**"
      - "packages/**"
      - "npm/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "pnpm-lock.yaml"
      - ".github/workflows/frontend.yml"

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Build @alidade-app/protocol
        run: pnpm --filter @alidade-app/protocol run build

      - name: Typecheck workspace
        run: pnpm -r run typecheck

      - name: Build @alidade-app/app
        run: pnpm --filter @alidade-app/app run build
