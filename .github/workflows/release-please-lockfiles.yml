# Companion workflow for release-please.yml.
#
# release-please rewrites version strings across the workspace but does
# NOT execute package managers, so Cargo.lock, pnpm-lock.yaml, and
# python/uv.lock drift out of step with the new version pins. This
# workflow watches the release PR branch and re-refreshes those
# lockfiles whenever release-please opens or updates the PR.
#
# Note on recursion: commits pushed here use the default GITHUB_TOKEN,
# which by GitHub design does NOT trigger downstream workflow runs —
# so this workflow committing back to the PR branch won't fire itself,
# release-please.yml, or release.yml in a loop.

name: release-please-lockfiles

on:
  # `pull_request` (rather than `push`) so the workflow uses the merge
  # commit's environment — closer to what CI would see on merge. Also
  # makes the trigger event explicit per PR action.
  pull_request:
    branches: [main]
    # opened — first time the PR appears
    # synchronize — release-please pushed a new commit to the PR branch
    # reopened — someone reopened a previously closed release PR
    types: [opened, synchronize, reopened]

# Need contents: write to push the lockfile commit back to the PR branch.
# Default GITHUB_TOKEN has read-only contents permission by default; we
# elevate just for this job.
permissions:
  contents: write

jobs:
  update-lockfiles:
    # Gate by branch name. release-please names its branches
    # "release-please--<components>--<base>", e.g.
    # "release-please--branches--main". We only want to fire on those —
    # not on every PR a human opens.
    if: startsWith(github.head_ref, 'release-please--')

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Check out the PR's source branch (NOT the default merge
          # commit), because we need to commit back to that branch.
          ref: ${{ github.head_ref }}
          # GITHUB_TOKEN is implicit, but stating it explicitly here is
          # a reminder that this checkout's credentials are what we'll
          # push with at the end of the job.
          token: ${{ secrets.GITHUB_TOKEN }}

      # Set up every toolchain that touches a lockfile.
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - uses: astral-sh/setup-uv@v8.2.0

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      # Cargo.lock: `cargo update --workspace` rebumps every workspace
      # crate's recorded version to match Cargo.toml. Falls back to a
      # plain `cargo build` if --workspace isn't applicable for some
      # reason; both end up writing Cargo.lock.
      - name: Refresh Cargo.lock
        run: cargo update --workspace --quiet || cargo build --quiet

      # --lockfile-only writes pnpm-lock.yaml without populating
      # node_modules. Faster than a full install and sufficient for this
      # job (we don't run anything against the modules here).
      - name: Refresh pnpm-lock.yaml
        run: pnpm install --lockfile-only

      # `uv lock` recomputes uv.lock without performing a sync into a
      # venv — same intent as pnpm install --lockfile-only.
      - name: Refresh python/uv.lock
        working-directory: python
        run: uv lock

      # Standard "GitHub Actions bot" author identity. The numeric uid
      # `41898282` is the long-lived bot user's GitHub uid; using its
      # noreply email keeps the commit attributed to the bot in the UI.
      - name: Commit and push lockfile updates (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # `--porcelain` returns empty stdout when the tree is clean;
          # we only commit if at least one of the three lockfiles
          # actually changed.
          if [[ -n "$(git status --porcelain)" ]]; then
            git add Cargo.lock pnpm-lock.yaml python/uv.lock
            git commit -m "chore: refresh lockfiles"
            git push
          else
            echo "No lockfile changes needed."
          fi
